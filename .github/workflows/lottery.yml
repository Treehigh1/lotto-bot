name: Lottery Bot

on:
  schedule:
    # Runs daily at 11:00 PM AEST (1:00 PM UTC) — after all draws
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lottery bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python lottery.py

      - name: Commit and push results
        run: |
          git config user.name "lottery-bot"
          git config user.email "lottery-bot@users.noreply.github.com"
          git add results.json lottery_state.json
          git diff --staged --quiet || git commit -m "🎰 Update lottery results $(date +'%Y-%m-%d')"
          git push
